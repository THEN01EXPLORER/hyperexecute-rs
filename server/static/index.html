<!DOCTYPE html>
<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>HyperCompiler | Online IDE</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700&display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;700;900&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.min.css" />

    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface": "#10131b",
                        "on-surface": "#e0e2ee",
                        "primary": "#b0c6ff",
                        "secondary": "#4edea3",
                        "error": "#ffb4ab",
                        "outline": "#8c90a1",
                        "surface-container": "#1c1f28",
                        "surface-container-high": "#272a33",
                        "surface-container-highest": "#32353e"
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #0b0e16;
            color: #e0e2ee;
        }

        .crt-overlay {
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%),
                linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
            z-index: 20;
        }

        .neon-text-primary {
            text-shadow: 0 0 5px #3b82f6, 0 0 10px #3b82f6;
        }

        .glitch {
            animation: glitch 1s linear infinite;
        }

        @keyframes glitch {

            2%,
            64% {
                transform: translate(2px, 0) skew(0deg);
            }

            4%,
            60% {
                transform: translate(-2px, 0) skew(0deg);
            }

            62% {
                transform: translate(0, 0) skew(5deg);
            }
        }

        /* Terminal / Editor overrides */
        #terminal {
            height: 100%;
        }

        #editor {
            height: 100%;
        }

        .monaco-editor,
        .monaco-editor-background {
            background-color: #050505 !important;
        }

        .loading {
            width: 14px;
            height: 14px;
            border: 2px solid rgba(59, 130, 246, 0.3);
            border-radius: 50%;
            border-top-color: #3b82f6;
            animation: spin 1s linear infinite;
            display: none;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .status-badge {
            font-family: 'JetBrains Mono';
            font-size: 10px;
            color: #4edea3;
            text-transform: uppercase;
            display: none;
        }
    </style>
</head>

<body class="h-screen w-screen overflow-hidden flex flex-col font-['Inter']">
    <!-- Header -->
    <header
        class="fixed top-0 w-full z-50 flex justify-between items-center px-6 h-16 bg-[#0A0A0A]/90 backdrop-blur-xl border-b border-blue-900/30 shadow-[0_0_20px_rgba(0,112,255,0.15)]">
        <div class="flex items-center gap-4">
            <span
                class="text-2xl font-black text-blue-500 italic tracking-widest font-['JetBrains_Mono'] uppercase skew-x-[-10deg]">HyperCompiler</span>
            <div id="status" class="status-badge ml-4">[ SAVED_TO_VAULT ]</div>
        </div>

        <nav class="hidden md:flex items-center gap-8 font-['JetBrains_Mono'] text-xs font-bold uppercase">
            <select id="languageSelect"
                class="bg-transparent text-blue-400 border-none outline-none cursor-pointer hover:text-blue-300">
                <option value="Python">PYTHON_ENV</option>
                <option value="JavaScript">NODE_JS_ENV</option>
                <option value="Cpp">GCC_CPP_ENV</option>
            </select>
            <a href="/history.html" class="text-gray-500 hover:text-blue-400 transition-colors">LOG_HISTORY</a>
        </nav>

        <div class="flex items-center gap-4 font-['JetBrains_Mono']">
            <button onclick="saveCode()"
                class="hidden lg:block border border-blue-500/50 text-blue-400 px-4 py-1.5 rounded hover:bg-blue-900/20 transition-all text-xs font-bold uppercase">
                COMMIT_CHANGES
            </button>
            <div class="flex gap-2">
                <button class="text-gray-600 hover:text-blue-400 p-2"><span
                        class="material-symbols-outlined text-[20px]">terminal</span></button>
                <button class="text-gray-600 hover:text-blue-400 p-2"><span
                        class="material-symbols-outlined text-[20px]">skull</span></button>
            </div>
        </div>
    </header>

    <div class="flex flex-1 pt-16 h-full w-full">
        <!-- Sidebar -->
        <aside class="hidden md:flex flex-col items-center py-4 bg-[#0A0A0A] w-20 border-r border-blue-900/20 h-full">
            <nav class="flex flex-col w-full gap-2">
                <button
                    class="w-full py-4 flex flex-col items-center gap-1 bg-blue-600/10 text-blue-400 border-l-4 border-blue-500">
                    <span class="material-symbols-outlined">folder_open</span>
                    <span class="text-[9px] font-bold font-['JetBrains_Mono']">FILES</span>
                </button>
                <button
                    class="w-full py-4 flex flex-col items-center gap-1 text-gray-600 hover:text-blue-400 hover:bg-blue-900/10">
                    <span class="material-symbols-outlined">manage_search</span>
                    <span class="text-[9px] font-bold font-['JetBrains_Mono']">SEARCH</span>
                </button>
                <button
                    class="w-full py-4 flex flex-col items-center gap-1 text-gray-600 hover:text-blue-400 hover:bg-blue-900/10">
                    <span class="material-symbols-outlined">hub</span>
                    <span class="text-[9px] font-bold font-['JetBrains_Mono']">NODES</span>
                </button>
                <a href="/history.html"
                    class="w-full py-4 flex flex-col items-center gap-1 text-gray-600 hover:text-blue-400 hover:bg-blue-900/10">
                    <span class="material-symbols-outlined">history_edu</span>
                    <span class="text-[9px] font-bold font-['JetBrains_Mono']">LOGS</span>
                </a>
            </nav>
            <div class="mt-auto flex flex-col items-center pb-4 gap-4">
                <div class="w-8 h-8 rounded bg-blue-900/20 border border-blue-500/30 flex items-center justify-center">
                    <span class="material-symbols-outlined text-blue-500 text-sm">person_off</span>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 flex flex-col lg:flex-row p-6 gap-6 overflow-hidden relative bg-[#050505]">
            <!-- Editor (Tilted) -->
            <section
                class="flex-1 flex flex-col bg-[#0A0A0A] border border-blue-900/30 rounded-lg transform -rotate-1 shadow-[0_0_30px_rgba(0,0,0,0.5)] overflow-hidden relative z-10">
                <div class="h-10 bg-[#111111] border-b border-blue-900/20 flex items-center px-4 justify-between">
                    <div class="flex items-center gap-2">
                        <span class="material-symbols-outlined text-blue-500 text-sm">description</span>
                        <span class="font-['JetBrains_Mono'] text-xs text-blue-300"
                            id="fileNameDisplay">MAIN_EXPLOIT.PY</span>
                    </div>
                    <div class="flex gap-1.5">
                        <div class="w-2.5 h-2.5 rounded-full bg-red-500/20 border border-red-500/40"></div>
                        <div class="w-2.5 h-2.5 rounded-full bg-yellow-500/20 border border-yellow-500/40"></div>
                        <div class="w-2.5 h-2.5 rounded-full bg-green-500/20 border border-green-500/40"></div>
                    </div>
                </div>
                <div id="editor" class="flex-1"></div>
            </section>

            <!-- Right Column -->
            <div class="w-full lg:w-[450px] flex flex-col gap-6 relative z-20">
                <!-- Terminal (Tilted) -->
                <section
                    class="flex-1 flex flex-col bg-[#000] border border-green-900/30 rounded-lg transform rotate-1 shadow-2xl overflow-hidden relative">
                    <div class="absolute inset-0 crt-overlay"></div>
                    <div class="h-8 bg-[#0a0a0a] border-b border-green-900/20 flex items-center px-4">
                        <span
                            class="font-['JetBrains_Mono'] text-[10px] text-green-500/70 uppercase tracking-widest">SYS.STDOUT
                            // BUFFER_STREAM</span>
                    </div>
                    <div id="terminal-wrapper" class="flex-1 relative p-2 overflow-hidden">
                        <div id="terminal"></div>
                        <div id="terminal-loading"
                            class="absolute inset-0 bg-black flex items-center justify-center text-green-500 font-['JetBrains_Mono'] text-xs">
                            [ INITIATING_STREAM... ]
                        </div>
                    </div>
                </section>

                <!-- Execute Button -->
                <div
                    class="h-40 bg-[#0A0A0A] border border-red-900/30 rounded-lg p-6 flex items-center justify-center transform -rotate-2 relative shadow-lg">
                    <div class="absolute inset-2 border border-dashed border-red-500/20 rounded pointer-events-none">
                    </div>
                    <button id="runBtn" onclick="executeCode()"
                        class="group relative bg-red-600 text-white font-black text-2xl uppercase px-12 py-4 rounded border-b-[6px] border-red-900 active:border-b-0 active:translate-y-[6px] transition-all shadow-[0_0_20px_rgba(255,0,0,0.3)] flex items-center gap-4">
                        <div id="loading" class="loading"></div>
                        <span
                            class="material-symbols-outlined text-[32px] group-active:animate-ping">priority_high</span>
                        <span class="btn-text">EXECUTE</span>
                    </button>
                </div>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.38.0/min/vs/loader.min.js"></script>

    <script>
        let editor, term, socket;
        let inputBuffer = '';

        function initTerminal() {
            try {
                const T = window.Terminal || (typeof Terminal !== 'undefined' ? Terminal : null);
                if (!T) { setTimeout(initTerminal, 200); return; }

                document.getElementById('terminal-loading').style.display = 'none';
                term = new T({
                    theme: { background: '#000000', foreground: '#4edea3', cursor: '#4edea3' },
                    fontFamily: "'JetBrains Mono', monospace",
                    fontSize: 11,
                    cursorBlink: true,
                    convertEol: true
                });
                term.open(document.getElementById('terminal'));
                term.write('\x1b[1;32m[+] SYSTEM_READY. ESTABLISHING ENCRYPTED LINK...\x1b[0m\r\n');

                term.onData(data => {
                    if (socket && socket.readyState === WebSocket.OPEN) {
                        let sendData = data;
                        if (data === '\r') {
                            sendData = '\n';
                            term.write('\r\n');
                            inputBuffer = '';
                        } else if (data === '\x7F') {
                            if (inputBuffer.length > 0) {
                                inputBuffer = inputBuffer.slice(0, -1);
                                term.write('\b \b');
                            } else return;
                        } else {
                            inputBuffer += data;
                            term.write(data);
                        }
                        socket.send(sendData);
                    }
                });
            } catch (e) { console.error(e); }
        }

        function initMonaco() {
            if (typeof require === 'undefined') { setTimeout(initMonaco, 200); return; }
            require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.38.0/min/vs' } });
            require(['vs/editor/editor.main'], function () {
                editor = monaco.editor.create(document.getElementById('editor'), {
                    value: 'name = input("TARGET_IDENTIFIER: ")\nprint(f"[+] BREACH_SUCCESSFUL. HELLO, {name}.")\n',
                    language: 'python',
                    theme: 'vs-dark',
                    fontFamily: "'JetBrains Mono', monospace",
                    fontSize: 14,
                    minimap: { enabled: false },
                    padding: { top: 20 },
                    automaticLayout: true
                });
                loadSnippetFromUrl();
            });
        }

        window.onload = () => { initTerminal(); initMonaco(); };

        function executeCode() {
            if (!editor || !term) return;
            if (socket && socket.readyState === WebSocket.OPEN) { socket.close(); return; }

            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}/ws/execute`;

            socket = new WebSocket(wsUrl);
            const runBtn = document.getElementById('runBtn');
            const loader = document.getElementById('loading');
            const btnSpan = runBtn.querySelector('.btn-text');

            socket.onopen = () => {
                inputBuffer = '';
                term.clear();
                term.write('\x1b[1;34m[!] INJECTING_PAYLOAD...\x1b[0m\r\n');
                loader.style.display = 'inline-block';
                btnSpan.innerText = 'ABORT';

                socket.send(JSON.stringify({
                    language: document.getElementById('languageSelect').value,
                    code: editor.getValue()
                }));
            };

            socket.onmessage = (event) => term.write(event.data);
            socket.onclose = () => {
                term.write('\r\n\x1b[1;33m[!] DISCONNECTED.\x1b[0m\r\n');
                loader.style.display = 'none';
                btnSpan.innerText = 'EXECUTE';
            };
        }

        async function saveCode() {
            if (!editor) return;
            const status = document.getElementById('status');
            try {
                const res = await fetch('/save', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        language: document.getElementById('languageSelect').value,
                        code: editor.getValue()
                    })
                });
                const data = await res.json();
                window.history.pushState({}, '', `/?id=${data.snippet_id}`);
                status.style.display = 'inline-block';
                setTimeout(() => status.style.display = 'none', 3000);
            } catch (e) { console.error(e); }
        }

        document.getElementById('languageSelect').addEventListener('change', (e) => {
            if (!editor) return;
            const langMap = { 'Python': 'python', 'JavaScript': 'javascript', 'Cpp': 'cpp' };
            const lang = e.target.value;
            monaco.editor.setModelLanguage(editor.getModel(), langMap[lang]);
            document.getElementById('fileNameDisplay').innerText =
                lang === 'Python' ? 'MAIN_EXPLOIT.PY' : (lang === 'JavaScript' ? 'WORM_CORE.JS' : 'BINARY_BREACH.CPP');
        });
    </script>
</body>

</html>
